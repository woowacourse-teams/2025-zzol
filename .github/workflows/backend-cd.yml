name: Backend Deploy (CD)

on:
  push:
    branches:
      - be/dev
      - be/prod
    paths:
      - 'backend/**'
      - '.github/scripts/deploy-*.sh'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: backend-deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. 공통 빌드/테스트 워크플로우 호출 (backend-ci.yml 재사용)
  ci-and-build:
    uses: ./.github/workflows/backend-ci.yml
    with:
      environment: ${{ inputs.environment }}

  # 2. Deploy Job
  deploy:
    needs: ci-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 빌드 단계에서 결정된 환경 사용
    environment: ${{ needs.ci-and-build.outputs.environment }}
    permissions:
      contents: read
      packages: write
      deployments: write
      issues: write

    env:
      ENVIRONMENT: ${{ needs.ci-and-build.outputs.environment }}
      REPO_OWNER: ${{ needs.ci-and-build.outputs.repo_owner }}
      IMAGE_TAG: ${{ needs.ci-and-build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Scan artifacts for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: backend/build/libs
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/build/libs
          file: backend/docker/app/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/zzol-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup old GHCR images (keep 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'zzol-backend'
          package-type: 'container'
          min-versions-to-keep: 5
          # 태그 유무와 상관없이 오래된 버전은 모두 삭제 대상에 포함 (최신 5개 제외)
          delete-only-untagged-versions: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v9
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ env.ENVIRONMENT }}',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${context.sha.substring(0, 7)} to ${{ env.ENVIRONMENT }}`
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set Deployment Status (in_progress)
        uses: ./.github/actions/deployment-status
        with:
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: in_progress
          status_description: Deployment in progress
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          cat > .env << EOF
          REGISTRY=ghcr.io/${{ env.REPO_OWNER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ORACLE_NAMESPACE=${{ secrets.ORACLE_NAMESPACE }}
          ORACLE_BUCKET=${{ secrets.ORACLE_BUCKET }}
          STDICT_API_KEY=${{ secrets.STDICT_API_KEY }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          TEMPO_URL=${{ secrets.TEMPO_URL }}
          TRACE_SAMPLING_PROBABILITY=${{ secrets.TRACE_SAMPLING_PROBABILITY }}
          EOF
          # IMAGE_TAG는 deploy-application.sh 인자로 전달 (Blue/Green 색상별 관리)
          # ORACLE_REGION은 ap-chuncheon-1 기본값 사용 (변경 필요 시 시크릿으로 추가)

      - name: Transfer files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "backend/docker/${{ env.ENVIRONMENT }}/docker-compose.yml,.github/scripts/deploy-*.sh,.env"
          target: /tmp/deploy-${{ env.ENVIRONMENT }}/

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV: ${{ env.ENVIRONMENT }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ENV,IMAGE_TAG
          script: |
            set -e
            DEPLOY_DIR="${HOME}/${ENV}"
            TMP_DIR="/tmp/deploy-${ENV}"

            trap "rm -rf '${TMP_DIR}'" EXIT

            mkdir -p "${DEPLOY_DIR}"

            cp "${TMP_DIR}/backend/docker/${ENV}/docker-compose.yml" "${DEPLOY_DIR}/"
            cp "${TMP_DIR}"/.github/scripts/deploy-*.sh "${DEPLOY_DIR}/"
            chmod +x "${DEPLOY_DIR}"/deploy-*.sh

            # .env 업데이트: 시크릿은 덮어쓰되 BLUE/GREEN_IMAGE_TAG는 보존
            NEW_ENV="${TMP_DIR}/.env"
            OLD_ENV="${DEPLOY_DIR}/.env"
            if [[ -f "${OLD_ENV}" ]]; then
              grep -E "^(BLUE|GREEN)_IMAGE_TAG=" "${OLD_ENV}" >> "${NEW_ENV}" || true
            fi
            cp "${NEW_ENV}" "${OLD_ENV}"

            cd "${DEPLOY_DIR}"

            "${DEPLOY_DIR}/deploy-infrastructure.sh" "${ENV}" "${DEPLOY_DIR}"
            "${DEPLOY_DIR}/deploy-application.sh" "${ENV}" "${DEPLOY_DIR}" "${IMAGE_TAG}"

            echo "=== Deployment Completed ==="

      - name: Set Deployment Status (success)
        if: success() && steps.create_deployment.outputs.deployment_id
        uses: ./.github/actions/deployment-status
        with:
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: success
          status_description: Deployment succeeded
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Deployment Status (failure)
        if: failure() && steps.create_deployment.outputs.deployment_id
        uses: ./.github/actions/deployment-status
        with:
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: failure
          status_description: Deployment failed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'deployment-failure';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label
              });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'd73a4a',
                  description: 'Deployment failure alert'
                });
              } else {
                core.warning(`Failed to check label: ${error.message}`);
              }
            }

            const title = `🚨 Deployment failed: ${context.sha.substring(0, 7)} to ${{ env.ENVIRONMENT }}`;
            const body = [
              `## Deployment Failure`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Environment** | \`${{ env.ENVIRONMENT }}\` |`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Commit** | \`${context.sha}\` |`,
              `| **Image Tag** | \`${{ env.IMAGE_TAG }}\` |`,
              `| **Workflow Run** | [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              ``,
              `### Rollback`,
              `자동 롤백이 시도되었습니다. 서버 상태를 확인하고, 필요 시 [수동 롤백 워크플로우](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/backend-rollback.yml)를 실행하세요.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: [label]
            });

      - name: Deployment Summary
        if: always()
        run: |
          {
            echo "### Deployment Summary :rocket:"
            echo ""
            echo "- **Environment:** ${{ env.ENVIRONMENT }}"
            echo "- **Branch:** ${{ github.ref_name }}"
            echo "- **Commit:** ${{ github.sha }}"
            echo "- **Image Tag:** ${{ env.IMAGE_TAG }}"
            echo "- **Deploy Directory:** ~/${{ env.ENVIRONMENT }}"
            echo "- **Status:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
