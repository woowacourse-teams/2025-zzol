name: Backend CI & Build

on:
  # 1. PR 발생 시 자동 실행 (테스트 용도)
  pull_request:
    branches:
      - be/dev
      - be/prod
      - dev
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

  # 2. 다른 워크플로우(Deploy)에서 호출 가능하도록 설정
  workflow_call:
    inputs:
      environment:
        description: 'Deploy environment (optional)'
        required: false
        type: string
    outputs:
      environment:
        description: "Determined environment"
        value: ${{ jobs.ci-build.outputs.environment }}
      repo_owner:
        description: "Repository owner"
        value: ${{ jobs.ci-build.outputs.repo_owner }}
      image_tag:
        description: "Docker image tag"
        value: ${{ jobs.ci-build.outputs.image_tag }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  ci-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # output을 상위 워크플로우로 전달
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      repo_owner: ${{ steps.set-env.outputs.repo_owner }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set deployment environment
        id: set-env
        run: |
          chmod +x ../.github/scripts/validate-deployment.sh
          
          INPUT_ENV="${{ inputs.environment }}"
          
          # PR일 때는 validate-deployment를 패스하고 'test' 환경으로 설정
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
             echo "Running in PR mode - Setting dummy environment for build"
             ENVIRONMENT="test"
          else
             # Deploy에서 호출했을 때는 스크립트로 환경 검증
             ENVIRONMENT=$(../.github/scripts/validate-deployment.sh "${{ github.event_name }}" "${{ github.ref }}" "$INPUT_ENV")
          fi
          
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> $GITHUB_OUTPUT
          
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${ENVIRONMENT}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # PR 런도 캐시를 저장한다 — 같은 PR에 커밋을 거듭 푸시할 때
          # 직전 푸시에서 실행한 모듈 테스트 결과(FROM-CACHE)를 재사용하기 위함.
          # 캐시는 head 브랜치 스코프에 저장되고, 다른 브랜치는 base/default 브랜치
          # 캐시를 단방향으로 읽기만 하므로 sibling PR이나 배포 빌드(be/dev·be/prod)로
          # 역전파되지 않는다. 10GB LRU 압박은 v6 기본 cache-cleanup(on-success)이 완화.
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 모듈별 test JVM이 같은 MySQL/Valkey 컨테이너를 재사용하도록 활성화 (ADR-0013)
      # 모듈별 독립 DB(zzol_test_<module>)·Redis DB 인덱스 격리로 병렬 실행 시에도 안전하다
      - name: Enable Testcontainers reuse
        run: echo "testcontainers.reuse.enable=true" > ~/.testcontainers.properties

      - name: Run Tests
        run: ./gradlew test jacocoTestReport --build-cache --no-daemon

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/*/build/test-results/test/*.xml
          check_name: "Backend Test Results"

      - name: Report Coverage
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: backend/*/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Backend Test Coverage"
          update-comment: true
          min-coverage-overall: 45
          min-coverage-changed-files: 60

      - name: Build JAR
        if: github.event_name != 'pull_request'
        run: ./gradlew bootJar --build-cache --no-daemon

      - name: Upload Build Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            backend/app/build/libs
            backend/docker
            .github/scripts
