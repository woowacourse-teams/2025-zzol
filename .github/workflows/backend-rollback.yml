name: Backend Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Image tag to rollback to (leave empty for previous version)'
        required: false
        type: string

concurrency:
  group: backend-deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      deployments: write

    env:
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v9
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ env.ENVIRONMENT }}',
              auto_merge: false,
              required_contexts: [],
              description: `Rollback ${{ env.ENVIRONMENT }} to ${{ inputs.image_tag || 'previous version' }}`
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set Deployment Status (in_progress)
        uses: ./.github/actions/deployment-status
        with:
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: in_progress
          status_description: Rollback in progress
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Transfer rollback scripts via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: ".github/scripts/deploy-*.sh"
          target: /tmp/rollback-${{ env.ENVIRONMENT }}/

      - name: Execute Rollback
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV: ${{ env.ENVIRONMENT }}
          TARGET_TAG: ${{ inputs.image_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ENV,TARGET_TAG
          script: |
            set -e
            DEPLOY_DIR="${HOME}/${ENV}"
            TMP_DIR="/tmp/rollback-${ENV}"

            trap "rm -rf '${TMP_DIR}'" EXIT

            if [[ ! -d "${DEPLOY_DIR}" ]]; then
              echo "Deploy directory not found: ${DEPLOY_DIR}"
              exit 1
            fi

            cp "${TMP_DIR}"/.github/scripts/deploy-*.sh "${DEPLOY_DIR}/"
            chmod +x "${DEPLOY_DIR}"/deploy-*.sh

            cd "${DEPLOY_DIR}"

            if [[ -n "${TARGET_TAG}" ]]; then
              "${DEPLOY_DIR}/deploy-rollback.sh" "${ENV}" "${DEPLOY_DIR}" "${TARGET_TAG}"
            else
              "${DEPLOY_DIR}/deploy-rollback.sh" "${ENV}" "${DEPLOY_DIR}"
            fi

      - name: Set Deployment Status (success)
        if: success() && steps.create_deployment.outputs.deployment_id
        uses: ./.github/actions/deployment-status
        with:
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: success
          status_description: Rollback succeeded
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Deployment Status (failure)
        if: failure() && steps.create_deployment.outputs.deployment_id
        uses: ./.github/actions/deployment-status
        with:
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: failure
          status_description: Rollback failed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rollback Summary
        if: always()
        run: |
          {
            echo "### Rollback Summary :rewind:"
            echo ""
            echo "- **Environment:** ${{ env.ENVIRONMENT }}"
            echo "- **Target Tag:** ${{ inputs.image_tag || 'previous version' }}"
            echo "- **Triggered by:** ${{ github.actor }}"
            echo "- **Status:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
