name: Backend Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Image tag to rollback to (leave empty for previous version)'
        required: false
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: '${{ env.ENVIRONMENT }}',
              auto_merge: false,
              required_contexts: [],
              description: `Rollback ${{ env.ENVIRONMENT }} to ${{ inputs.image_tag || 'previous version' }}`
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set Deployment Status (in_progress)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Rollback in progress'
            });

      - name: Execute Rollback
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV: ${{ env.ENVIRONMENT }}
          TARGET_TAG: ${{ inputs.image_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: ENV,TARGET_TAG
          script: |
            set -e
            DEPLOY_DIR="${HOME}/${ENV}"

            if [[ ! -d "${DEPLOY_DIR}" ]]; then
              echo "Deploy directory not found: ${DEPLOY_DIR}"
              exit 1
            fi

            cd "${DEPLOY_DIR}"

            if [[ -n "${TARGET_TAG}" ]]; then
              "${DEPLOY_DIR}/deploy-rollback.sh" "${ENV}" "${DEPLOY_DIR}" "${TARGET_TAG}"
            else
              "${DEPLOY_DIR}/deploy-rollback.sh" "${ENV}" "${DEPLOY_DIR}"
            fi

      - name: Set Deployment Status (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Rollback succeeded'
            });

      - name: Set Deployment Status (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create_deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Rollback failed'
            });

      - name: Rollback Summary
        if: always()
        run: |
          echo "### Rollback Summary :rewind:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Tag:** ${{ inputs.image_tag || 'previous version' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
