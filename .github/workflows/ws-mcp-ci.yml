name: ws-mcp CI

on:
  pull_request:
    paths:
      - 'tools/ws-mcp/**'
      - 'backend/src/test/resources/__fixtures__/ws-catalog.json'
      - '.github/workflows/ws-mcp-ci.yml'
  push:
    branches:
      - be/dev
    paths:
      - 'tools/ws-mcp/**'
      - 'backend/src/test/resources/__fixtures__/ws-catalog.json'
      - '.github/workflows/ws-mcp-ci.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ws-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: tools/ws-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tools/ws-mcp/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint + typescript-eslint)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (L1 단위 + L2 컨트랙트)
        run: npm test

      - name: Build
        run: npm run build
