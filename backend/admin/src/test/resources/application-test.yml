spring:
  config:
    import:
      - "classpath:application-test-base.yml"
      - "classpath:application-test-game.yml"

nickname-audit:
  gemini-api-key: test-key
  model: gemini-test
  flagged-threshold: 0.85
  batch-size: 10
  feedback-injection-threshold: 20
  min-term-length: 2

slack:
  webhook-url: ""

room:
  removalDelay: 1h
  qr:
    width: 150
    height: 150
    prefix: https://coffee-shout.com/join/
    presignedUrl:
      expirationHours: 1
    storage-key-prefix: qr-code
  event:
    timeout: 5s

player:
  removalDelay: 15s

roulette:
  default-adjustment-weight: 0.7
