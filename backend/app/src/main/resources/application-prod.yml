spring:
  data:
    redis:
      host: ${REDIS_HOST}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

web:
  cors:
    allowed-origins:
      - https://zzol.site
      - https://www.zzol.site
      - https://api.zzol.site   # 어드민 페이지(/admin/**)가 api.zzol.site에서 서빙 — 차단 해제 등 어드민 호출 CORS 허용

room:
  qr:
    prefix: "https://www.zzol.site/join/"

websocket:
  docs:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

server:
  tomcat:
    remoteip:
      internal-proxies: "172\\.20\\.0\\.\\d{1,3}"
