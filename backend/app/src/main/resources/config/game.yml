# 미니게임 타이밍 및 스케줄러 설정 (card-game, block-stacking, ladder, racing-game, speed-touch, blind-timer, roulette)
game:
  scheduler:
    pool-size: 2   # 전 게임 공통 (GameTaskSchedulerFactory)

card-game:
  timing:
    first-loading: 4000ms
    loading: 3000ms
    prepare: 2000ms
    playing: 10250ms
    score-board: 1500ms
    early-finish-delay: 2000ms

block-stacking:
  timing:
    prepare: 3000ms
    playing: 20000ms
    all-failed-delay: 2000ms

ladder:
  timing:
    description: 4000ms
    prepare: 2000ms
    drawing: 8000ms
    drawing-grace-period: 300ms
    result: 5000ms

racing-game:
  timing:
    description: 4000ms
    prepare: 2000ms
    race-finished-delay: 2000ms
    move-interval: 100ms

speed-touch:
  timing:
    description: 4000ms
    prepare: 2000ms
    playing: 30000ms

blind-timer:
  timing:
    description: 4000ms
    prepare: 2000ms
    blind-delay: 3000ms
    timeout-buffer: 3000ms
    result-delay: 2000ms

nunchi:
  timing:
    number-window: 300ms        # 동시 판정 윈도우(ADR-0031 Q2 — 첫 press anchor + 300ms)
    collision-cooldown: 2000ms  # 충돌 후 재개 대기(결정 6)
    idle-timeout: 10000ms       # 무입력 자동 종료(결정 5 — 유효 입력마다 리셋, 쿨다운 중 일시정지)
    hard-cap: 30000ms           # 라운드 전체 강제 종료 안전망(결정 5)
    prepare: 2000ms             # 시작 전 준비(다른 게임 일관)
    early-finish-delay: 2000ms  # 전원 입력/종료 후 결과 발행 지연

roulette:
  default-adjustment-weight: 0.7
