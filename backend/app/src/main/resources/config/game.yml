# 미니게임 타이밍 및 스케줄러 설정 (card-game, block-stacking, ladder, racing-game, speed-touch, blind-timer, roulette)
game:
  scheduler:
    pool-size: 2   # 전 게임 공통 (GameTaskSchedulerFactory)

card-game:
  timing:
    first-loading: 4000ms
    loading: 3000ms
    prepare: 2000ms
    playing: 10250ms
    score-board: 1500ms
    early-finish-delay: 2000ms

block-stacking:
  timing:
    prepare: 3000ms
    playing: 20000ms
    all-failed-delay: 2000ms

ladder:
  timing:
    description: 4000ms
    prepare: 2000ms
    drawing: 8000ms
    drawing-grace-period: 300ms
    result: 5000ms

racing-game:
  timing:
    description: 4000ms
    prepare: 2000ms
    race-finished-delay: 2000ms
    move-interval: 100ms

speed-touch:
  timing:
    description: 4000ms
    prepare: 2000ms
    playing: 30000ms

blind-timer:
  timing:
    description: 4000ms
    prepare: 2000ms
    blind-delay: 3000ms
    timeout-buffer: 3000ms
    result-delay: 2000ms

nunchi:
  timing:
    description: 4000ms         # 시작 규칙 설명(다른 미니게임과 동일하게 PLAYING 진입 전 짧게 대기)
    number-window: 300ms        # 동시 판정 윈도우(ADR-0031 Q2 — 첫 press anchor + 300ms)
    collision-cooldown: 2000ms  # 충돌 후 재개 대기(결정 6)
    idle-timeout: 10000ms       # 무입력 자동 종료(결정 5 — 유효 입력마다 리셋, 쿨다운 중 일시정지)
    hard-cap: 30000ms           # 라운드 전체 강제 종료 안전망(결정 5)
    all-pressed-delay: 1000ms   # 전원 입력 조기 종료 시 마지막 입력을 잠깐 보여주고 DONE으로 전이(결정 5)
    result-delay: 1000ms        # 종료(DONE) 후 결과를 잠깐 보여주고 다음 단계(SCORE_BOARD)로 전이(결정 9)

roulette:
  default-adjustment-weight: 0.7
