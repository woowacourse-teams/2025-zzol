# 미니게임 타이밍 및 스케줄러 설정 (card-game, block-stacking, ladder, speed-touch, blind-timer, roulette)
game:
  scheduler:
    pool-size: 2   # 전 게임 공통 (GameTaskSchedulerFactory)

card-game:
  timing:
    first-loading: 4000ms
    loading: 3000ms
    prepare: 2000ms
    playing: 10250ms
    score-board: 1500ms
    early-finish-delay: 2000ms

block-stacking:
  timing:
    prepare: 3000ms
    playing: 20000ms
    all-failed-delay: 2000ms

ladder:
  timing:
    description: 4000ms
    prepare: 2000ms
    drawing: 8000ms
    drawing-grace-period: 300ms
    result: 5000ms

speed-touch:
  timing:
    description: 4000ms
    prepare: 2000ms
    playing: 30000ms

blind-timer:
  timing:
    description: 4000ms
    prepare: 2000ms
    blind-delay: 3000ms
    timeout-buffer: 3000ms
    result-delay: 2000ms

roulette:
  default-adjustment-weight: 0.7
