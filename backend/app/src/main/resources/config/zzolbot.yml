# ZzolBot — Gemini AI 챗봇, 모니터링 도구, SQL 쿼리 허용 테이블 정의
zzol-bot:
  gemini-api-key: ${GEMINI_ZZOL_BOT_API_KEY:}
  model: gemini-2.5-flash
  max-loop-iterations: 8
  default-window-minutes: 60
  tool-timeout-millis: 10000
  monitoring:
    loki-url: ${LOKI_URL:http://loki:3100}
    tempo-url: ${ZZOL_BOT_TEMPO_URL:http://tempo:3200}
    prometheus-url: ${PROMETHEUS_URL:http://prometheus:9090}
    environment: ${SPRING_PROFILES_ACTIVE:local}
  determinism:
    temperature: 0.1
    top-p: 0.1
  monitor:
    enabled: ${ZZOL_BOT_MONITOR_ENABLED:true}    # Alertmanager firing 알림 분석 활성 여부
    error-log-window-minutes: 240                # ERROR 로그 샘플 조회 윈도우(기본 4시간)
    enrich-cooldown-minutes: 240                 # 같은 fingerprint 재분석 최소 간격(기본 4시간). 중복 분석 방지 — 재시도·flapping 흡수 + 지속 장애 LLM 재호출 비용 절감. 0이면 비활성
  slack:
    webhook-url: ${ZZOL_BOT_SLACK_WEBHOOK_URL:}  # 미설정 시 알림 비활성
  llm-budget:
    daily-max: ${ZZOL_BOT_LLM_DAILY_MAX:10}      # 분석 작업 일일 LLM 호출 하드 캡(비용 상한). env로 조절
  remediation:
    enabled: ${ZZOL_BOT_REMEDIATION_ENABLED:false}   # 자동 수정 PR 디스패치 활성 여부(기본 비활성 — PAT·워크플로우 배포 후 켠다)
    github-token: ${ZZOL_BOT_GH_DISPATCH_TOKEN:}     # repository_dispatch용 fine-grained PAT. GITHUB_TOKEN으론 dispatch 불가·CI 미트리거. 미설정 시 디스패치 실패
    repo-owner: ${ZZOL_BOT_REPO_OWNER:woowacourse-teams}
    repo-name: ${ZZOL_BOT_REPO_NAME:2025-coffee-shout}
    daily-max: ${ZZOL_BOT_REMEDIATION_DAILY_MAX:5}   # 일일 수정 디스패치 하드캡(오클릭·폭주 방지)
    cooldown-minutes: ${ZZOL_BOT_REMEDIATION_COOLDOWN_MINUTES:240}   # 같은 fingerprint 재수정 최소 간격(기본 4시간). 0이면 비활성. 인시던트 시 env로 즉시 조절
    defect-whitelist: [NULL_POINTER]                 # 자동 수정 대상 결함 유형. 화이트리스트 밖은 디스패치 안 하고 제안만
  sql:
    max-rows: 1000
    query-timeout-seconds: 5
    allowed-tables:
      - name: app_user
        description: "회원 정보 (soft-delete 적용 — 활성 회원 집계 시 deleted_at IS NULL 필터 필요)"
        columns: [id, user_code, nickname, created_at, deleted_at]
        blocked-columns: [provider_user_id]
      - name: oauth_account
        description: "OAuth 연동 계정 (provider/email 수준만 노출)"
        columns: [id, user_id, provider, email, linked_at]
        blocked-columns: [provider_user_id]
      - name: room_session
        description: "완료된 방 세션 기록 (방 상태는 Redis, 영속 기록은 이 테이블)"
        columns: [id, join_code, room_status, created_at, finished_at]
        blocked-columns: []
      - name: player
        description: "방 세션별 플레이어 참여 기록"
        columns: [id, room_session_id, player_name, player_type, user_id, created_at]
        blocked-columns: []
      - name: mini_game_play
        description: "방 세션 내 미니게임 진행 기록"
        columns: [id, room_session_id, mini_game_type]
        blocked-columns: []
      - name: mini_game_result
        description: "미니게임 참가자별 결과 (순위, 점수)"
        columns: [id, mini_game_play_id, player_id, player_rank, score, created_at]
        blocked-columns: []
      - name: roulette_result
        description: "룰렛 당첨자 기록"
        columns: [id, room_session_id, winner_id, winner_probability, created_at]
        blocked-columns: []
      - name: user_stats
        description: "회원별 게임 통계 (승리 횟수, 생존 연속)"
        columns: [id, user_id, win_count, survival_streak]
        blocked-columns: []
      - name: friendship
        description: "친구 관계 (PENDING/ACCEPTED)"
        columns: [id, requester_id, addressee_id, status, created_at, updated_at]
        blocked-columns: []
      - name: report
        description: "신고 내역"
        columns: [id, category, game_type, join_code, content, created_at]
        blocked-columns: []
      - name: outbox_event
        description: "아웃박스 이벤트 (Redis Stream 발행 재시도용)"
        columns: [id, status, join_code, created_at]
        blocked-columns: []
      - name: patch_note
        description: "운영자 패치노트"
        columns: [id, category, title, content, created_at, updated_at]
        blocked-columns: []
      - name: nickname_audit
        description: "플레이어명 AI 검열 결과"
        columns: [id, nickname, status, confidence, reason, created_at, audited_at]
        blocked-columns: []
      - name: nickname_feedback
        description: "플레이어명 검열에 대한 운영자 피드백"
        columns: [id, nickname, ai_flagged, ai_confidence, operator_decision, reason, created_at]
        blocked-columns: []
      - name: custom_profanity
        description: "커스텀 비속어 목록"
        columns: [id, word, source, created_at]
        blocked-columns: []
      - name: zzolbot_session
        description: "ZzolBot 대화 이력 (질문/답변/피드백)"
        columns: [id, question, answer, feedback, admin_username, created_at]
        blocked-columns: []
