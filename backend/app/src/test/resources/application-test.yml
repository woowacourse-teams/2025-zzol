spring:
  config:
    import: "classpath:application-test-base.yml"
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
  jpa:
    properties:
      hibernate:
        hbm2ddl:
          halt_on_error: false

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    coffeeshout: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      group:
        readiness:
          include: "db,redis,redisStream"

room:
  qr:
    prefix: https://coffee-shout.com/join/

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4813

tracing:
  sampling:
    probability: 1.0

block-stacking:
  timing:
    prepare: 500ms
    playing: 2000ms

ladder:
  timing:
    description: 500ms
    prepare: 500ms
    drawing: 1000ms
    drawing-grace-period: 300ms
    result: 500ms

card-game:
  timing:
    first-loading: 500ms
    loading: 500ms
    prepare: 500ms
    playing: 2000ms
    score-board: 500ms
    early-finish-delay: 500ms

speed-touch:
  timing:
    description: 500ms
    prepare: 500ms
    playing: 30000ms

blind-timer:
  timing:
    description: 500ms
    prepare: 500ms
    blind-delay: 500ms
    timeout-buffer: 3000ms
    result-delay: 500ms

zzol-bot:
  gemini-api-key: test-key
  model: gemini-test
  max-loop-iterations: 3
  default-window-minutes: 60
  tool-timeout-millis: 5000
  monitoring:
    loki-url: http://loki:3100
    tempo-url: http://tempo:3200
    prometheus-url: http://prometheus:9090
    environment: test
  determinism:
    temperature: 0.1
    top-p: 0.1
  sql:
    max-rows: 100
    query-timeout-seconds: 3
    allowed-tables:
      - name: app_user
        description: "회원 정보"
        columns: [id, user_code, nickname, created_at, deleted_at]
        blocked-columns: [provider_user_id]
      - name: room_session
        description: "완료된 방 세션 기록"
        columns: [id, join_code, room_status, created_at, finished_at]
        blocked-columns: []
      - name: mini_game_result
        description: "미니게임 결과"
        columns: [id, mini_game_play_id, player_id, player_rank, score, created_at]
        blocked-columns: []
      - name: outbox_event
        description: "아웃박스 이벤트"
        columns: [id, status, join_code, created_at]
        blocked-columns: []
