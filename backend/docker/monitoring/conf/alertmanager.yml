# Alertmanager 설정 — ZZOL 단일 알림 엔진 (ADR-0026 Phase A)
#
# 시크릿 주입: global.slack_api_url_file 로 webhook URL을 "파일"에서 읽는다.
#   Alertmanager는 config에서 ${ENV} 확장을 하지 않으므로(-config.expand-env는 Loki/Tempo 전용)
#   compose env·${SLACK_URL} 치환은 동작하지 않는다(ADR-0026 §4, 결정 4).
#   서버에서 ~/monitor/secrets/slack_api_url 를 생성(chmod 600)해야 컨테이너가 뜬다.
#   이 파일은 secrets 디렉터리 마운트(./secrets:/etc/alertmanager/secrets:ro)로 주입된다.
#
# 전달 채널: Slack #problem (인시던트 채널). webhook이 이 채널을 향하도록 발급돼야 한다.
global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/slack_api_url

# 알림 그룹화·라우팅. critical은 더 빠르게/자주 알린다.
route:
  receiver: slack-default
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # ADR-0032 골격: firing 알림을 zzol-bot LLM 보강 수신기로 미러링한다.
    # continue: true 로 기존 Slack 라우팅(아래)을 그대로 유지한다(전환기 병존).
    # 후속 PR에서 enriched 경로로 일원화하며 중복 알림을 정리한다.
    - receiver: zzolbot-enrich
      continue: true
    - matchers:
        - severity = "critical"
      receiver: slack-critical
      group_wait: 10s
      repeat_interval: 1h

# SLO burn-rate: fast(critical)가 켜지면 같은 job의 slow(warning)는 중복이므로 억제.
# (severity만으로 묶으면 14룰의 alertname이 전부 단일 severity라 매칭되지 않는 죽은 설정이 된다 —
#  실제로 동시 발화하는 쌍은 이 fast/slow 하나뿐이라 alertname으로 직접 지정한다.)
inhibit_rules:
  - source_matchers:
      - alertname = "ErrorBudgetBurnFast"
    target_matchers:
      - alertname = "ErrorBudgetBurnSlow"
    equal: ['job']

  # 단일 근본원인(app-down)이 critical을 증폭하지 않게 억제(ADR-0026 Phase B).
  # 앱이 통째로 죽으면 AppInstanceDown(sum by(job)(up)==0)과 함께, 메트릭 소실로 absent
  # 동반룰(JVM 힙·서킷·WS 지연)이 동시에 발화한다 — 같은 사건의 파생이므로 AppInstanceDown이
  # 같은 job의 absent 룰을 억제한다. equal: ['job']로 dev↔prod 교차 억제를 막는다.
  # (AppInstanceDown은 up이 사라지는 게 아니라 up==0이라 source가 살아 있어 inhibition 성립.)
  - source_matchers:
      - alertname = "AppInstanceDown"
    target_matchers:
      - alertname =~ "JvmHeapMetricAbsent|CircuitBreakerMetricAbsent|WsInboundLatencyMetricAbsent"
    equal: ['job']

  # node-exporter 소실: MonitoringTargetDown(job="node")이 NodeCpuMetricAbsent를 억제.
  # equal: ['job']이라 node의 MonitoringTargetDown에만 매칭된다.
  # (MonitoringTargetDown for:5m > NodeCpuMetricAbsent for:2m라 초기 ~3분은 absent가 단독
  #  발화 후 억제된다 — 지속 중복 페이지는 막되 첫 알림은 빠른 쪽이 먼저 도착.)
  - source_matchers:
      - alertname = "MonitoringTargetDown"
    target_matchers:
      - alertname = "NodeCpuMetricAbsent"
    equal: ['job']

receivers:
  - name: slack-default
    slack_configs:
      - channel: '#problem'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}*{{ .Labels.severity | toUpper }}* · {{ .Labels.job }}{{ if .Labels.instance }} ({{ .Labels.instance }}){{ end }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}

  # ADR-0032 골격: zzol-bot LLM 보강 수신기. firing만 보낸다(보강은 firing에만 의미).
  # 아래 url은 placeholder다 — raw 색 컨테이너(dev-app-blue) 직격은 금지.
  # TODO(후속 PR): nginx 내부 전용 location 경유로 교체한다. 활성 색 SoT는 nginx의
  #   *-service.inc($upstream)라, nginx로 보내면 블루-그린 활성 색 추종 + 네트워크 도달 +
  #   내부 노출 차단이 한 번에 해결된다(ADR-0032 트레이드오프). Alertmanager(monitoring-network)가
  #   nginx 내부 리스너에 도달하도록 docker-compose 네트워크 조인도 함께.
  - name: zzolbot-enrich
    webhook_configs:
      # placeholder — 후속 PR에서 nginx 내부 엔드포인트로 교체(raw 색 직격 금지)
      - url: http://dev-app-blue:8080/internal/zzolbot/alerts/webhook
        send_resolved: false

  - name: slack-critical
    slack_configs:
      - channel: '#problem'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}*{{ .Labels.severity | toUpper }}* · {{ .Labels.job }}{{ if .Labels.instance }} ({{ .Labels.instance }}){{ end }}
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
