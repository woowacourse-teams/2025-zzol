services:
  # ============================================
  # Tempo - Distributed Tracing
  # ============================================
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    user: "0:0"
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml", "-config.expand-env=true"]
    volumes:
      - tempo-data:/tmp/tempo
      - tempo-logs:/var/log/tempo
      - ./conf/tempo.yml:/etc/tempo.yaml:ro
    networks:
      - monitoring-network
      - dev-network
      - prod-network
    expose:
      - "3200"   # Grafana 쿼리용
      - "4318"   # Spring OTLP HTTP
    environment:
      - TZ=Asia/Seoul
    # 자원 제한 (Tempo - Tracing)
    deploy:
      resources:
        limits:
          cpus: '0.3'        # 최대 0.3 vCPU
          memory: 1G         # 최대 1GB
        reservations:
          cpus: '0.15'       # 최소 0.15 vCPU
          memory: 512M       # 최소 512MB

  # ============================================
  # Prometheus - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    user: "65534:65534"  # nobody:nogroup (Prometheus 기본 UID)
    restart: unless-stopped
    volumes:
      - prometheus-data:/prometheus
      - prometheus-logs:/var/log/prometheus
      - ./conf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./conf/rules:/etc/prometheus/rules:ro   # ADR-0026: 알림 룰 파일
    networks:
      - monitoring-network
      - dev-network
      - prod-network
    expose:
      - "9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=3GB'
      - '--web.enable-lifecycle'
    environment:
      - TZ=Asia/Seoul
    # 자원 제한 (Prometheus - Metrics)
    deploy:
      resources:
        limits:
          cpus: '0.4'        # 최대 0.4 vCPU
          memory: 1536M      # 최대 1.5GB (TSDB + query)
        reservations:
          cpus: '0.2'        # 최소 0.2 vCPU
          memory: 1G         # 최소 1GB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Alertmanager - Alert Routing & Delivery (ADR-0026)
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./conf/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./secrets:/etc/alertmanager/secrets:ro   # slack_api_url (서버에서 생성, 미커밋)
      - alertmanager-data:/alertmanager
    networks:
      - monitoring-network   # prometheus가 alertmanager:9093 으로 접근
    expose:
      - "9093"               # 호스트 미노출 — 검증은 docker exec / 내부 네트워크
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      - TZ=Asia/Seoul
    # 자원 제한 (Alertmanager - 경량)
    deploy:
      resources:
        limits:
          cpus: '0.15'       # 최대 0.15 vCPU
          memory: 192M       # 최대 192MB
        reservations:
          cpus: '0.05'       # 최소 0.05 vCPU
          memory: 64M        # 최소 64MB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Grafana - Visualization
  # ============================================
  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    user: "472:472"  # grafana:grafana (Grafana 기본 UID)
    restart: unless-stopped
    volumes:
      - ./data/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./data/grafana/grafana_data:/var/lib/grafana
      - ./data/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./logs/grafana:/var/log/grafana
    networks:
      - zzol-network
      - monitoring-network
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_DEFAULT_ROLE=Viewer
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://status.zzol.site
      - TZ=Asia/Seoul
    # 자원 제한 (Grafana - Visualization)
    deploy:
      resources:
        limits:
          cpus: '0.3'        # 최대 0.3 vCPU
          memory: 768M       # 최대 768MB
        reservations:
          cpus: '0.15'       # 최소 0.15 vCPU
          memory: 512M       # 최소 512MB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # ============================================
  # Loki - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
      - loki-logs:/var/log/loki
      - ./conf/loki.yml:/etc/loki/loki.yaml:ro
      - /usr/share/zoneinfo/Asia/Seoul:/etc/localtime:ro
    networks:
      - monitoring-network
      - dev-network
      - prod-network
    expose:
      - "3100"
    command: -config.file=/etc/loki/loki.yaml -config.expand-env=true
    environment:
      - TZ=Asia/Seoul
    # 자원 제한 (Loki - Logs)
    deploy:
      resources:
        limits:
          cpus: '0.3'        # 최대 0.3 vCPU
          memory: 1G         # 최대 1GB
        reservations:
          cpus: '0.15'       # 최소 0.15 vCPU
          memory: 512M       # 최소 512MB

  # ============================================
  # cAdvisor - Container Metrics
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: cadvisor
    privileged: true
    restart: unless-stopped
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=10s'
      - '--max_housekeeping_interval=15s'
      - '--event_storage_event_limit=default=0'
      - '--event_storage_age_limit=default=0'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-network
    expose:
      - "8080"
    environment:
      - TZ=Asia/Seoul
    devices:
      - /dev/kmsg
    # 자원 제한 (cAdvisor - Container Metrics)
    deploy:
      resources:
        limits:
          cpus: '0.2'        # 최대 0.2 vCPU
          memory: 256M       # 최대 256MB
        reservations:
          cpus: '0.1'        # 최소 0.1 vCPU
          memory: 128M       # 최소 128MB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # node-exporter - Host Metrics (CPU/Memory/Disk)
  # ============================================
  # 호스트(OS) 단위 메트릭. cAdvisor가 컨테이너를, 이것이 호스트 자체를 본다.
  # 디스크/CPU 룰(provisioning/alerting, Phase B에서 Prometheus로 이관)이 이 메트릭에 의존한다.
  # 컨테이너명은 prometheus.yml의 'node' job 타깃(node-exporter:9100)과 일치해야 한다.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      # 컨테이너 내부 가상 마운트 제외 → 디스크 룰의 mountpoint="/"가 호스트 루트를 가리키게 한다.
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|rootfs)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring-network
    expose:
      - "9100"
    environment:
      - TZ=Asia/Seoul
    # 자원 제한 (node-exporter - 경량)
    deploy:
      resources:
        limits:
          cpus: '0.1'        # 최대 0.1 vCPU
          memory: 128M       # 최대 128MB
        reservations:
          cpus: '0.05'       # 최소 0.05 vCPU
          memory: 32M        # 최소 32MB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9100/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================
# Networks
# ============================================
networks:
  monitoring-network:
    driver: bridge
    name: monitoring-network
  dev-network:
    external: true
  prod-network:
    external: true
  zzol-network:
    external: true

# ============================================
# Volumes
# ============================================
volumes:
  prometheus-data:
    driver: local
  prometheus-logs:
    driver: local
  grafana-data:
    driver: local
  grafana-logs:
    driver: local
  loki-data:
    driver: local
  loki-logs:
    driver: local
  tempo-data:
    driver: local
  tempo-logs:
    driver: local
  alertmanager-data:
    driver: local
