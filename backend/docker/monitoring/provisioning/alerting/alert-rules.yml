# Grafana Alert Rules - ZZOL 서비스 알림 규칙
#
# 규칙 설계 원칙:
# - HealthIndicator(DOWN → 재시작)로 처리할 수 없는 것만 여기서 알림
# - 재시작으로 해결 안 되지만, 사람이 인지해야 하는 상황
# - 임계값은 부하 테스트 실측 데이터와 인프라 스펙 기반
apiVersion: 1

groups:
  # ============================================
  # WebSocket 연결 상태
  # ============================================
  - orgId: 1
    name: websocket-alerts
    folder: ZZOL
    interval: 30s
    rules:
      # WebSocket 연결 실패율 증가
      # 정상: 연결 실패 거의 0
      # 알림 조건: 5분간 실패 10건 이상
      - uid: ws-connection-failures
        title: WebSocket 연결 실패 증가
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: increase(websocket_connections_failed_total[5m])
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "WebSocket 연결 실패가 5분간 10건 이상 발생했습니다."
        labels:
          severity: warning

  # ============================================
  # 응답 시간
  # ============================================
  - orgId: 1
    name: latency-alerts
    folder: ZZOL
    interval: 1m
    rules:
      # WebSocket inbound 메시지 처리 지연
      # 정상: p99 < 100ms (부하 테스트 기준 스레드 32개에서 113ms)
      # 알림 조건: p99가 500ms 초과 (서비스 품질 저하 체감 수준)
      # 왜 500ms: 레이싱 게임에서 0.5초 지연은 "렉"으로 체감됨
      - uid: ws-inbound-latency
        title: WebSocket 메시지 처리 지연
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: websocket_message_inbound_time_seconds{quantile="0.99"}
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.5
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: "WebSocket inbound 메시지 p99 처리 시간이 500ms를 초과했습니다."
        labels:
          severity: critical

  # ============================================
  # 인프라 리소스
  # ============================================
  - orgId: 1
    name: infra-alerts
    folder: ZZOL
    interval: 1m
    rules:
      # JVM 힙 메모리 사용률
      # Prod: -Xmx4200m, 경고 임계값 85% = 3,570MB
      # 왜 85%: GC 오버헤드가 급증하기 시작하는 구간. 90%면 이미 OOM 직전
      - uid: jvm-heap-high
        title: JVM 힙 메모리 사용률 높음
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                jvm_memory_used_bytes{area="heap", job="prod-app"}
                / jvm_memory_max_bytes{area="heap", job="prod-app"} * 100
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "JVM 힙 메모리 사용률이 85%를 초과했습니다. GC 오버헤드 증가 및 OOM 위험."
        labels:
          severity: critical

      # DB 커넥션 풀 사용률
      # HikariCP 기본 maximumPoolSize: 10
      # 알림 조건: 활성 연결이 8개 이상 (80%)
      # 왜 80%: 여유분 2개는 헬스체크, 스케줄러 등 내부 작업용
      - uid: db-connection-pool-high
        title: DB 커넥션 풀 사용률 높음
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: hikaricp_connections_active{job="prod-app"}
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 8
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: "DB 커넥션 풀 활성 연결이 8개를 초과했습니다 (최대 10개). 슬로우 쿼리 또는 커넥션 누수 확인 필요."
        labels:
          severity: warning

      # Redis 응답 시간
      # 정상: < 1ms
      # 알림 조건: 평균 응답 시간 50ms 초과
      # 왜 50ms: ZZOL은 게임 액션마다 Redis 호출. 50ms면 체감 지연 시작
      - uid: redis-latency-high
        title: Redis 응답 시간 증가
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                rate(redis_commands_duration_seconds_total{job="dev-redis"}[5m])
                / rate(redis_commands_processed_total{job="dev-redis"}[5m])
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.05
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: "Redis 평균 응답 시간이 50ms를 초과했습니다."
        labels:
          severity: warning

  # ============================================
  # 서킷 브레이커
  # ============================================
  - orgId: 1
    name: circuit-breaker-alerts
    folder: ZZOL
    interval: 30s
    rules:
      # 서킷 브레이커 OPEN 감지
      # OracleObjectStorage 서킷 브레이커가 열리면 QR 코드 생성 불가
      # state: 0=CLOSED, 1=OPEN, 2=HALF_OPEN
      - uid: circuit-breaker-open
        title: 서킷 브레이커 OPEN
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: resilience4j_circuitbreaker_state{state="open"}
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "서킷 브레이커가 OPEN 상태입니다. 외부 서비스(OracleObjectStorage) 장애 확인 필요."
        labels:
          severity: critical

  # ============================================
  # 호스트 리소스
  # ============================================
  - orgId: 1
    name: host-alerts
    folder: ZZOL
    interval: 1m
    rules:
      # 디스크 사용률
      # 알림 조건: 85% 초과
      # 왜 85%: 로그 파일, Redis AOF, MySQL binlog가 디스크를 점유.
      # 90%면 쓰기 실패 가능성
      - uid: disk-usage-high
        title: 디스크 사용률 높음
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                100 - (node_filesystem_avail_bytes{mountpoint="/", job="node"}
                / node_filesystem_size_bytes{mountpoint="/", job="node"} * 100)
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "디스크 사용률이 85%를 초과했습니다. 로그 정리 또는 디스크 확장이 필요합니다."
        labels:
          severity: warning

      # CPU 사용률
      # t4g.small: vCPU 2개
      # 알림 조건: 90% 초과 5분 지속
      - uid: cpu-usage-high
        title: CPU 사용률 높음
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                100 - (avg(rate(node_cpu_seconds_total{mode="idle", job="node"}[5m])) * 100)
              intervalMs: 15000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 90
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "CPU 사용률이 90%를 초과했습니다 (5분 지속)."
        labels:
          severity: critical
