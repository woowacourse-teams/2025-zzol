# ============================================
# Common HTTP Settings
# ============================================
# nginx 기본 이미지의 http {} 블록 안에 include됩니다.
# main context 지시자(user, events 등)는 포함하지 않습니다.
# conf.d 파일은 알파벳 순으로 로드되므로 00- 접두사로 최우선 로드됩니다.

# ============================================
# Gzip 압축
# ============================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript
           application/json application/javascript application/xml+rss
           application/rss+xml font/truetype font/opentype
           application/vnd.ms-fontobject image/svg+xml;

# ============================================
# Rate Limiting Zones
# ============================================
# $binary_remote_addr: 클라이언트 IP 기반 (IPv4: 4bytes, IPv6: 16bytes)
# zone 크기 10m: 약 16만 개의 IPv4 주소 저장 가능

# 방 생성 API 제한: 초당 2건
# 근거: 한 사람이 점심시간에 방을 1~2개 만드는 게 정상. 초당 2건 이상은 비정상.
limit_req_zone $binary_remote_addr zone=room_create:10m rate=2r/s;

# 방 참여 API 제한: 초당 5건
# 근거: 팀원 9명이 동시에 입장할 수 있지만, 같은 IP에서 초당 5건 이상은 비정상.
limit_req_zone $binary_remote_addr zone=room_join:10m rate=5r/s;

# 일반 API 제한: 초당 10건
# 근거: 방 상태 조회, 미니게임 목록 등은 빈도가 높지 않음. 초당 10건 이상은 비정상.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

# WebSocket 핸드셰이크 제한: 초당 3건
# 근거: 한 사람이 한 번 연결하고 유지. SockJS 재연결 포함해도 초당 3건 이상은 비정상.
limit_req_zone $binary_remote_addr zone=ws_handshake:10m rate=3r/s;

# Rate Limit 초과 시 응답 코드 (기본 503 → 429로 변경)
limit_req_status 429;

# Rate Limit 초과 시 로그 레벨 (기본 error → warn으로 낮춤)
limit_req_log_level warn;
