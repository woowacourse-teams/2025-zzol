# ============================================
# Coffee Shout - Nginx Reverse Proxy Configuration
# ============================================

# Upstream 정의
upstream dev_backend {
    server dev-app:8080 max_fails=3 fail_timeout=30s;
}

upstream prod_backend {
    server prod-app:8080 max_fails=3 fail_timeout=30s;
}

upstream grafana {
    server grafana:3000 max_fails=3 fail_timeout=30s;
}

# ============================================
# Health Check Endpoint (Nginx 자체)
# ============================================
server {
    listen 80;
    server_name _;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================
# Dev Environment
# ============================================
server {
    listen 80;
    server_name dev.zzol.site;

    # 로그
    access_log /var/log/nginx/dev-access.log main;
    error_log /var/log/nginx/dev-error.log warn;

    # 방 생성 API (POST /rooms)
    location = /rooms {
        limit_req zone=room_create burst=4 nodelay;

        proxy_pass http://dev_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 방 참여 API (POST /rooms/{joinCode})
    location ~ ^/rooms/[A-Za-z0-9]+$ {
        limit_req zone=room_join burst=10 nodelay;

        proxy_pass http://dev_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket 핸드셰이크
    location /ws {
        limit_req zone=ws_handshake burst=5 nodelay;

        proxy_pass http://dev_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 일반 API (나머지)
    location / {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://dev_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}

