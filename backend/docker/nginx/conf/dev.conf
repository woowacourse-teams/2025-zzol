# HTTP -> HTTPS redirect
server {
	listen 80;
	server_name dev.api.zzol.site;

	include /etc/nginx/conf.d/acme-challenge.inc;

	location / {
		return 301 https://$server_name$request_uri;
	}

}

# HTTPS
server {
	listen 443 ssl;
       	http2 on;
	server_name dev.api.zzol.site;

	# SSL 공통 설정
	include /etc/nginx/conf.d/ssl-common.inc;

	resolver 127.0.0.11 valid=10s;

	include /etc/nginx/conf.d/dev-service.inc;

	location / {
		proxy_pass $upstream;
		include /etc/nginx/conf.d/proxy-http.inc;
	}

	# ADR-0032: /internal/** 은 공개 리스너에서 제공하지 않는다(내부 전용 리스너만 처리).
	location /internal/ {
		return 404;
	}

	# 웹소켓 연결 요청 전용 프록시 설정
	location /ws {
		proxy_pass $upstream;
		include /etc/nginx/conf.d/proxy-ws.inc;
	}

	access_log /var/log/nginx/dev.access.log;
	error_log /var/log/nginx/dev.error.log;
}
