# ADR-0032: Alertmanager → zzol-bot 웹훅 내부 전용 리스너.
#
# 호스트 미노출(nginx ports에 없음, expose만) + monitoring-network 내부에서만 도달
# (alertmanager → nginx:8889). $upstream(prod-service.inc = prod 활성 색)으로 프록시해
# 블루-그린 활성 색을 자동 추종한다(raw 색 컨테이너 직격 금지).
#
# 인증은 앱 Spring Security(/internal/** 베어러 토큰)가 담당하고, 이 리스너는 네트워크 격리만 책임진다.
# (dev 환경 보강이 필요하면 dev-service.inc를 include한 8890 리스너를 동일 패턴으로 추가 — deploy 결정.)
server {
        listen 8889;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        include /etc/nginx/conf.d/prod-service.inc;

        location /internal/zzolbot/alerts/ {
                proxy_pass $upstream;
                include /etc/nginx/conf.d/proxy-http.inc;
        }

        # 그 외 경로는 내부 리스너에서도 노출하지 않는다.
        location / {
                return 404;
        }
}
