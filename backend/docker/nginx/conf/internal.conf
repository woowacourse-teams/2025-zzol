# ADR-0032: Alertmanager → zzol-bot 웹훅 내부 전용 리스너.
#
# 호스트 미노출(nginx ports에 없음, expose만) + 도커 네트워크 내부에서만 도달.
# 두 리스너를 환경별로 분리한다(단일 nginx가 dev·prod conf를 함께 마운트하므로 env 치환 불가):
#   - 8889: prod 경로. alertmanager → nginx:8889 → $upstream(prod-service.inc = prod 활성 색).
#   - 8890: dev 경로. dev 웹훅 수동 테스트 → nginx:8890 → $upstream(dev-service.inc = dev-app).
# prod 전용 리스너로 dev 테스트가 유입돼 prod-app 404 → 내부 IP 누적 차단으로 번진 사고(postmortem 0003)의
# 재발 방지. $upstream으로 프록시해 블루-그린 활성 색을 자동 추종한다(raw 색 컨테이너 직격 금지).
#
# 인증은 앱 Spring Security(/internal/** 베어러 토큰)가 담당하고, 이 리스너는 네트워크 격리만 책임진다.
server {
        listen 8889;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        include /etc/nginx/conf.d/prod-service.inc;

        location /internal/zzolbot/alerts/ {
                proxy_pass $upstream;
                include /etc/nginx/conf.d/proxy-http.inc;
        }

        # 그 외 경로는 내부 리스너에서도 노출하지 않는다.
        location / {
                return 404;
        }
}

# dev 웹훅 수동 테스트 전용 리스너. prod(8889)와 동일 패턴, upstream만 dev-app으로 분리.
server {
        listen 8890;
        server_name _;

        resolver 127.0.0.11 valid=10s;

        include /etc/nginx/conf.d/dev-service.inc;

        location /internal/zzolbot/alerts/ {
                proxy_pass $upstream;
                include /etc/nginx/conf.d/proxy-http.inc;
        }

        # 그 외 경로는 내부 리스너에서도 노출하지 않는다.
        location / {
                return 404;
        }
}
