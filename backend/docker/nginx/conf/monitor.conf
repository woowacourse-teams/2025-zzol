server {
        listen 80;
        server_name status.zzol.site;
        location / {
                return 301 https://$server_name$request_uri;
        }
}

server {
        listen 443 ssl;
        http2 on;
        server_name status.zzol.site;

        ssl_certificate /etc/letsencrypt/live/status.zzol.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/status.zzol.site/privkey.pem;
        include /etc/nginx/conf.d/ssl-common.inc;

        # Grafana로 요청
        location / {
                proxy_pass http://grafana:3000;
                include /etc/nginx/conf.d/proxy-http.inc;
        }

        access_log /var/log/nginx/monitor.access.log;
        error_log /var/log/nginx/monitor.error.log;
}
