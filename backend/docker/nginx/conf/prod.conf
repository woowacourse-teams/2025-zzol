# HTTP -> HTTPS redirect
server {
        listen 80;
        server_name api.zzol.site;

        location / {
                return 301 https://$server_name$request_uri;
        }
}

# HTTPS
server {
        listen 443 ssl;
        http2 on;
        server_name api.zzol.site;

        ssl_certificate /etc/letsencrypt/live/api.zzol.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.zzol.site/privkey.pem;

        # SSL 공통 설정
        include /etc/nginx/conf.d/ssl-common.inc;

        resolver 127.0.0.11 valid=10s;

        # 현재 active 컨테이너 - deploy script가 이 파일을 직접 교체
        include /etc/nginx/conf.d/prod-service.inc;

        location / {
                proxy_pass $upstream;
                include /etc/nginx/conf.d/proxy-http.inc;
        }

        # 웹소켓 연결 요청 전용 프록시 설정
        location /ws {
                proxy_pass $upstream;
                include /etc/nginx/conf.d/proxy-ws.inc;
        }

        access_log /var/log/nginx/prod.access.log;
        error_log /var/log/nginx/prod.error.log;
}
