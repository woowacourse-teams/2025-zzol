services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./conf:/etc/nginx/conf.d
      - ./logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - zzol-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Asia/Seoul

networks:
  zzol-network:
    external: true
