services:
  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./conf:/etc/nginx/conf.d:ro
      - ./logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    networks:
      - zzol-network
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul  

networks:
  zzol-network:
    external: true
