# 게임 모듈 timing 테스트 공통 설정 — :game 빈을 컨텍스트에 올리는 모듈(:game, :app, :admin)이
# spring.config.import: classpath:application-test-game.yml 로 가져다 쓴다.
# *TimingProperties가 @NotNull 검증을 걸므로 게임 컨텍스트를 띄우는 테스트는 이 값들이 필수다.
block-stacking:
  timing:
    prepare: 500ms
    playing: 2000ms
    all-failed-delay: 500ms

ladder:
  timing:
    description: 500ms
    prepare: 500ms
    drawing: 500ms
    drawing-grace-period: 300ms
    result: 500ms

card-game:
  timing:
    first-loading: 500ms
    loading: 500ms
    prepare: 500ms
    playing: 2000ms
    score-board: 500ms
    early-finish-delay: 500ms

racing-game:
  timing:
    description: 500ms
    prepare: 500ms
    race-finished-delay: 500ms
    # IT 가속: 프로덕션 100ms 대비 자동이동 주기를 절반으로 줄여 완주(거리 3000) 도달을 ~2.5s로 단축.
    # 도메인 Runner.finishTime 정밀도는 static MOVE_INTERVAL_MILLIS(100ms)를 그대로 쓰지만,
    # 완주 IT는 DONE 상태만 검증하고 순위/완주시간은 검증하지 않으므로 영향 없음.
    move-interval: 50ms

speed-touch:
  timing:
    description: 500ms
    prepare: 500ms
    playing: 30000ms

blind-timer:
  timing:
    description: 500ms
    prepare: 500ms
    blind-delay: 500ms
    timeout-buffer: 3000ms
    result-delay: 500ms

nunchi:
  timing:
    number-window: 300ms        # 동시 판정 윈도우는 프로덕션과 동일(충돌 판정 규칙이라 단축 시 의미 변질)
    collision-cooldown: 500ms   # IT 가속
    idle-timeout: 2000ms        # IT 가속
    hard-cap: 5000ms            # IT 가속
    early-finish-delay: 500ms   # IT 가속
