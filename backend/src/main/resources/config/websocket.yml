# WebSocket 세션 토큰, 레이트 리밋, 메시지 복구, API 문서
websocket:
  room-session-token:
    secret: ${ROOM_SESSION_TOKEN_SECRET}
  rate-limit:
    max-messages-per-second: 20
  recovery:
    max-length: 1000
    stream-ttl-seconds: 3600
    dedup-ttl-seconds: 1
  docs:
    app-path: "/app"
    topic-path: "/topic"
    queue-path: "/queue"
    user-destination-prefix: "/user"
    stomp-endpoint: "/ws"
    error-topic: "/queue/errors"
    envelope-type: "WebSocketResponse"
    info:
      title: "커피빵 WebSocket API 명세서"
      version: "1.0.0"
      description: "실시간 웹소켓 통신 API 문서"
