<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건의사항/신고 대시보드 — 커피빵</title>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .nav-back {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: color var(--dur) var(--ease);
        }
        .nav-back:hover { color: var(--text-primary); }
        .filter-bar {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.33rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface);
            font-size: 0.78rem;
            font-family: inherit;
            color: var(--text-secondary);
            text-decoration: none;
            white-space: nowrap;
            transition: background var(--dur) var(--ease),
                        border-color var(--dur) var(--ease),
                        color var(--dur) var(--ease);
        }
        .filter-btn:hover {
            background: var(--surface-hover);
            border-color: var(--accent-border);
            color: var(--accent);
        }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: var(--shadow-accent);
        }
        .badge-resolved      { background: var(--green-bg);  color: var(--green-text); }
        .badge-pending-status { background: var(--amber-bg); color: var(--amber-text); }
        .content-cell {
            max-width: 320px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            color: var(--text-secondary);
        }
        .btn-resolve {
            background: var(--green-bg);
            color: var(--green-text);
            border-color: rgba(16,185,129,.2);
        }
        .tag {
            display: inline-block;
            padding: 0.17rem 0.52rem;
            border-radius: var(--radius-xs);
            font-size: 0.7rem;
            font-weight: 600;
            background: #f0f1f7;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }
        .pagination-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.55rem 0.9rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .pagination-compact {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
    </style>
</head>
<body>
<header>
    <h1>건의사항/신고 대시보드</h1>
    <form th:action="@{/admin/logout}" method="post">
        <button type="submit" class="logout-btn">로그아웃</button>
    </form>
</header>

<main>
    <a href="/admin" class="nav-back">← 대시보드로</a>

    <div class="section-header">
        <span class="section-title">신고 목록</span>
        <span class="badge badge-pending" th:text="${pendingCount}">0</span>
        <span style="font-size:0.8rem;color:#9ca3af;">미처리 건</span>
    </div>

    <div class="filter-bar">
        <a th:href="@{/admin/reports}" th:classappend="${statusFilter == null} ? ' active'" class="filter-btn">전체</a>
        <a th:href="@{/admin/reports(status='PENDING')}" th:classappend="${statusFilter?.name() == 'PENDING'} ? ' active'" class="filter-btn">미처리</a>
        <a th:href="@{/admin/reports(status='RESOLVED')}" th:classappend="${statusFilter?.name() == 'RESOLVED'} ? ' active'" class="filter-btn">처리 완료</a>
    </div>

    <div th:if="${reports.empty}" class="empty">조회된 신고가 없습니다.</div>

    <div th:if="${!reports.empty}" class="pagination-strip">
        <span>
            총 <strong th:text="${reports.totalElements}" style="color:var(--text-primary);">0</strong>건
            &nbsp;·&nbsp;
            <span th:text="${reports.pageable.offset + 1}">1</span>–<span th:text="${reports.pageable.offset + reports.numberOfElements}">20</span>번째 표시
        </span>
        <div class="pagination-compact" th:if="${reports.totalPages > 1}">
            <a class="page-btn" th:if="${!reports.first}"
               th:href="@{/admin/reports(page=${reports.number - 1}, status=${statusFilter})}">‹ 이전</a>
            <span class="page-current" th:text="${reports.number + 1}"></span>
            <span class="page-info">/ <span th:text="${reports.totalPages}"></span></span>
            <a class="page-btn" th:if="${!reports.last}"
               th:href="@{/admin/reports(page=${reports.number + 1}, status=${statusFilter})}">다음 ›</a>
        </div>
    </div>

    <div th:if="${!reports.empty}" class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>카테고리</th>
                <th>게임</th>
                <th>방코드</th>
                <th>내용</th>
                <th>접수일시</th>
                <th>상태</th>
                <th>처리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reports.content}">
                <td th:text="${r.id}" style="color:#9ca3af;font-size:0.8rem;"></td>
                <td><span class="tag" th:text="${r.category}"></span></td>
                <td>
                    <span th:if="${r.gameType != null}" class="tag" th:text="${r.gameType}"></span>
                    <span th:if="${r.gameType == null}" style="color:#d1d5db;">—</span>
                </td>
                <td>
                    <span th:if="${r.joinCode != null}" th:text="${r.joinCode}" style="font-family:monospace;"></span>
                    <span th:if="${r.joinCode == null}" style="color:#d1d5db;">—</span>
                </td>
                <td class="content-cell" th:text="${r.content}"></td>
                <td class="date" th:text="${#temporals.format(r.createdAt, 'MM-dd HH:mm')}"></td>
                <td>
                    <span th:if="${r.status.name() == 'PENDING'}" class="badge badge-pending-status">미처리</span>
                    <span th:if="${r.status.name() == 'RESOLVED'}" class="badge badge-resolved">처리 완료</span>
                </td>
                <td>
                    <form th:if="${r.status.name() == 'PENDING'}"
                          th:action="@{/admin/reports/{id}/resolve(id=${r.id})}" method="post">
                        <input type="hidden" name="page" th:value="${currentPage}">
                        <input type="hidden" name="status" th:value="${statusFilter}">
                        <button type="submit" class="btn btn-resolve">처리 완료</button>
                    </form>
                    <span th:if="${r.status.name() == 'RESOLVED'}" class="date"
                          th:text="${r.resolvedAt != null ? #temporals.format(r.resolvedAt, 'MM-dd HH:mm') : ''}"></span>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination" th:if="${reports.totalPages > 1}">
            <a class="page-btn" th:if="${!reports.first}"
               th:href="@{/admin/reports(page=${reports.number - 1}, status=${statusFilter})}">← 이전</a>
            <a class="page-btn" th:if="${pageStart > 0}"
               th:href="@{/admin/reports(page=0, status=${statusFilter})}">1</a>
            <span class="page-ellipsis" th:if="${pageStart > 1}">…</span>
            <th:block th:each="p : ${#numbers.sequence(pageStart, pageEnd)}">
                <span th:if="${p == reports.number}" class="page-current" th:text="${p + 1}"></span>
                <a th:unless="${p == reports.number}" class="page-btn"
                   th:href="@{/admin/reports(page=${p}, status=${statusFilter})}"
                   th:text="${p + 1}"></a>
            </th:block>
            <span class="page-ellipsis" th:if="${pageEnd < reports.totalPages - 2}">…</span>
            <a class="page-btn" th:if="${pageEnd < reports.totalPages - 1}"
               th:href="@{/admin/reports(page=${reports.totalPages - 1}, status=${statusFilter})}"
               th:text="${reports.totalPages}"></a>
            <a class="page-btn" th:if="${!reports.last}"
               th:href="@{/admin/reports(page=${reports.number + 1}, status=${statusFilter})}">다음 →</a>
        </div>
    </div>
</main>
</body>
</html>
