spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    hikari:
      maximum-pool-size: 5
      minimum-idle: 0
      idle-timeout: 10000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: profile,email
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            scope: profile_nickname,account_email
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: name,email
  jpa:
    hibernate:
      # create: 기동 시 DROP 후 재생성 — withReuse 환경에서 잔여 스키마를 정리한다
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  lifecycle:
    timeout-per-shutdown-phase: 1s
  flyway:
    enabled: false
  data:
    redis:
      ssl:
        enabled: false
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2

server:
  shutdown: immediate

redisson:
  enabled: true

logging:
  level:
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    coffeeshout: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318

resilience4j:
  ratelimiter:
    instances:
      geminiAudit:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 5s

report:
  rate-limit:
    ttl: 1s

room:
  qr:
    prefix: https://coffee-shout.com/join/

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4813

tracing:
  sampling:
    probability: 1.0

websocket:
  room-session-token:
    secret: "test-room-session-token-secret-key-must-be-at-least-256-bits-long"
  recovery:
    max-length: 100
    stream-ttl-seconds: 3600
    dedup-ttl-seconds: 1


user:
  jwt:
    secret: "test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm"
    access-token-expiration-seconds: 1800
    refresh-token-expiration-seconds: 1209600
  oauth:
    frontend-redirect-uri: "http://localhost:3000/auth/callback"

block-stacking:
  timing:
    prepare: 500ms
    playing: 2000ms

ladder:
  timing:
    description: 500ms
    prepare: 500ms
    drawing: 1000ms
    drawing-grace-period: 300ms
    result: 500ms

card-game:
  timing:
    first-loading: 500ms
    loading: 500ms
    prepare: 500ms
    playing: 2000ms
    score-board: 500ms
    early-finish-delay: 500ms

speed-touch:
  timing:
    description: 500ms
    prepare: 500ms
    playing: 30000ms

blind-timer:
  timing:
    description: 500ms
    prepare: 500ms
    blind-delay: 500ms
    timeout-buffer: 3000ms
    result-delay: 500ms

zzol-bot:
  gemini-api-key: test-key
  model: gemini-test
  max-loop-iterations: 3
  default-window-minutes: 60
  tool-timeout-millis: 5000
  monitoring:
    loki-url: http://loki:3100
    tempo-url: http://tempo:3200
    prometheus-url: http://prometheus:9090
    environment: test
  determinism:
    temperature: 0.1
    top-p: 0.1
  sql:
    max-rows: 100
    query-timeout-seconds: 3
    allowed-tables:
      - name: app_user
        description: "회원 정보"
        columns: [id, user_code, nickname, created_at, deleted_at]
        blocked-columns: [provider_user_id]
      - name: room_session
        description: "완료된 방 세션 기록"
        columns: [id, join_code, room_status, created_at, finished_at]
        blocked-columns: []
      - name: mini_game_result
        description: "미니게임 결과"
        columns: [id, mini_game_play_id, player_id, player_rank, score, created_at]
        blocked-columns: []
      - name: outbox_event
        description: "아웃박스 이벤트"
        columns: [id, status, join_code, created_at]
        blocked-columns: []

friend:
  presence:
    grace-period-seconds: 1
