    <style>
      @font-face {
        font-family: 'Pretendard Variable';
        src: url('/fonts/PretendardVariable.woff2') format('woff2-variations');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'PartialSansKR-Regular';
        src: url('/fonts/PartialSansKR-Regular.woff2') format('woff2');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @keyframes zzol-pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.75); }
        50%       { opacity: 1;   transform: scale(1); }
      }
      #zzol-splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 100dvh;
        background: #ffffff;
        text-align: center;
      }
      #zzol-splash h1 {
        font-family: 'Pretendard Variable', sans-serif;
        font-size: 0.9375rem;
        font-weight: 500;
        color: #888;
        margin: 0;
        line-height: 1.5;
      }
      #zzol-splash p {
        font-family: 'Pretendard Variable', sans-serif;
        font-size: 0.8125rem;
        font-weight: 400;
        color: #aaa;
        line-height: 1.75;
        max-width: 260px;
        margin: 0;
      }
      #zzol-dots {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-top: 8px;
      }
      #zzol-dots span {
        display: block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #F53E41;
        animation: zzol-pulse 1.2s ease-in-out infinite;
      }
      #zzol-dots span:nth-child(2) { animation-delay: 0.4s; }
      #zzol-dots span:nth-child(3) { animation-delay: 0.8s; }
    </style>
